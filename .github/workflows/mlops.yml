name: MLOps Pipeline

on:
  push:
    branches: [main, master]
    paths:
      - 'data/**.dvc'
      - 'src/**.py'
      - 'params.yaml'
  workflow_dispatch:

jobs:

  test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/ -v

  train:
    name: Train
    needs: test
    runs-on: ubuntu-latest
    outputs:
      accuracy: ${{ steps.read_metrics.outputs.accuracy }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Authenticate to Cloud Storage
        env:
          CLOUD_CREDENTIALS: ${{ secrets.CLOUD_CREDENTIALS }}
        run: |
          python - <<'EOF'
          import json, os
          creds = json.loads(os.environ["CLOUD_CREDENTIALS"])
          with open(os.environ["GITHUB_ENV"], "a") as f:
              f.write(f"AWS_ACCESS_KEY_ID={creds['aws_access_key_id']}\n")
              f.write(f"AWS_SECRET_ACCESS_KEY={creds['aws_secret_access_key']}\n")
              f.write("AWS_DEFAULT_REGION=us-east-1\n")
          EOF

      - name: Pull data with DVC
        run: dvc pull

      - name: Train model
        run: python src/train.py

      - name: Read metrics
        id: read_metrics
        run: |
          ACC=$(python -c "import json; d=json.load(open('outputs/metrics.json')); print(d['accuracy'])")
          echo "accuracy=$ACC" >> $GITHUB_OUTPUT

      - name: Upload model to Cloud Storage
        env:
          CLOUD_BUCKET: ${{ secrets.CLOUD_BUCKET }}
        run: |
          python - <<'EOF'
          import boto3
          import os

          bucket = os.environ["CLOUD_BUCKET"]
          s3 = boto3.client("s3")
          s3.upload_file("models/model.pkl", bucket, "models/latest/model.pkl")
          print(f"Uploaded model to s3://{bucket}/models/latest/model.pkl")
          EOF

      - name: Save metrics as artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: outputs/metrics.json

  eval:
    name: Eval
    needs: train
    runs-on: ubuntu-latest
    steps:

      - name: Check eval gate
        run: |
          python - <<'EOF'
          acc = float("${{ needs.train.outputs.accuracy }}")
          threshold = 0.70
          if acc < threshold:
              raise SystemExit(f"FAILED: accuracy {acc:.4f} < {threshold}. Huy deploy.")
          print(f"PASSED: accuracy {acc:.4f} >= {threshold}. Dang trien khai model.")
          EOF

  deploy:
    name: Deploy
    needs: eval
    runs-on: ubuntu-latest
    steps:

      - name: SSH deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            sudo systemctl restart mlops-serve
            sleep 5
            curl -sf http://localhost:8000/health && echo "Health check passed." || exit 1
